openapi: 3.0.0
info:
  title: Shopisel API List Service
  version: 1.0.0
  description: Pedidos relacionados com a lista de compras.

servers:
  - url: http://localhost:5000

paths:
  /lists:
    get:
      summary: Listar listas do utilizador
      tags: [List]
      responses:
        '200':
          description: Retorna as listas com o estado de cada produto
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ListResponse'
    post:
      summary: Criar nova lista
      tags: [List]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateListRequest'
      responses:
        '201':
          description: Lista criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'

  /lists/{listId}:
    get:
      summary: Obter lista especifica
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalhes da lista
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        '404':
          description: Lista nao encontrada
    put:
      summary: Atualizar lista (nome, produtos ou estado checked)
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateListRequest'
      responses:
        '200':
          description: Lista atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListResponse'
        '404':
          description: Lista nao encontrada
    delete:
      summary: Remover lista
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Lista removida
        '404':
          description: Lista nao encontrada

components:
  schemas:
    ListItem:
      type: object
      required: [productId, checked]
      properties:
        productId:
          type: string
        checked:
          type: boolean
    CreateListRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListItem'
    UpdateListRequest:
      type: object
      properties:
        name:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListItem'
    ListResponse:
      type: object
      required: [id, name, createdAt, items]
      properties:
        id:
          type: string
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/ListItem'
