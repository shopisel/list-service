openapi: 3.0.0
info:
  title: Shopisel API List Service
  version: 1.0.0
  description: Pedidos relacionados com a lista de compras.

servers:
  - url: http://localhost:5000/lists

paths:
  /lists:
    get:
      summary: Listar listas do utilizador
      tags: [List]
      responses:
        '200':
          description: Retorna as listas com o estado de cada produto
          content:
            application/json:
              example:
                - id: "list_001"
                  name: "Compras Semanais"
                  createdAt: "2024-03-20T10:00:00Z"
                  items:
                    - productId: "prod_1"
                      checked: true
                    - productId: "prod_2"
                      checked: false
                - id: "list_002"
                  name: "Compras de Festa"
                  items: []

    post:
      summary: Criar nova lista
      tags: [List]
      responses:
        '201':
          description: Lista criada
          content:
            application/json:
              example:
                id: "list_003"
                name: "Nova Lista"
                items: []

  /lists/{listId}:
    get:
      summary: Obter lista específica
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Detalhes da lista
          content:
            application/json:
              example:
                id: "list_001"
                name: "Compras Semanais"
                items:
                  - productId: "prod_1"
                    checked: true
                  - productId: "prod_2"
                    checked: false

    put:
      summary: Atualizar lista (nome, produtos ou estado checked)
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      requestBody: # <-- O que o utilizador envia
        required: true
        content:
          application/json:
            example:
              name: "Compras Semanais Atualizada"
              items:
                - productId: "prod_1"
                  checked: false
                - productId: "prod_2"
                  checked: true
                - productId: "prod_3" # Adicionando um novo produto
                  checked: false
      responses:
        '200':
          description: Lista atualizada com sucesso
          content:
            application/json:
              example:
                id: "list_001"
                name: "Compras Semanais Atualizada"
                items:
                  - productId: "prod_1"
                    checked: false
                  - productId: "prod_2"
                    checked: true
                  - productId: "prod_3"
                    checked: false

    delete:
      summary: Remover lista
      tags: [List]
      parameters:
        - name: listId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Lista removida